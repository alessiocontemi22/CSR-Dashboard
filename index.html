<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR Strategic Hub - Full Reporting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAabpS43j9KDSqJ8V7Vv5PfRvpZ4DvSSEk",
            authDomain: "csr-dashboard-5e613.firebaseapp.com",
            projectId: "csr-dashboard-5e613",
            storageBucket: "csr-dashboard-5e613.firebasestorage.app",
            messagingSenderId: "662684708122",
            appId: "1:662684708122:web:6e17a3bd8e31ff18be10a3",
            measurementId: "G-HQV1X5DELN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = JSON.parse(localStorage.getItem('csr_user_profile')) || null;
        let initiatives = [];
        let charts = { doughnut: null, bar: null };
        let editingId = null;
        let currentUnitIndex = 0;

        const categoryColors = {
            "Comunità e Ambiente": "#10b981",
            "Educazione e Giovani": "#3b82f6",
            "Salute e Inclusione": "#f59e0b"
        };

        function formatDate(dateString) {
            if (!dateString) return "N/D";
            const [year, month, day] = dateString.split("-");
            return `${day}/${month}/${year}`;
        }

        // --- EXPORT EXCEL (CSV) CON DESCRIZIONI ---
        window.exportToExcel = () => {
            if (initiatives.length === 0) return alert("Nessun dato da esportare");

            let csvContent = "data:text/csv;charset=utf-8,";
            // Header
            csvContent += "Nome Iniziativa,Categoria,Data,Frequenza,KPI Valore,Unita,Autore,Descrizione\n";

            initiatives.forEach(item => {
                // Pulizia descrizione: togliamo a capo e gestiamo le virgolette
                const cleanDesc = item.descrizione ? item.descrizione.replace(/\n/g, " ").replace(/"/g, '""') : "";
                
                const row = [
                    `"${item.nome_iniziativa}"`,
                    `"${item.categoria}"`,
                    `"${formatDate(item.data_evento)}"`,
                    `"${item.frequenza}"`,
                    `"${item.kpi_valore}"`,
                    `"${item.kpi_unita}"`,
                    `"${item.autore}"`,
                    `"${cleanDesc}"`
                ].join(",");
                csvContent += row + "\n";
            });

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `CSR_Report_Dati_${new Date().toLocaleDateString()}.csv`);
            link.click();
        };

        // --- DOWNLOAD PDF ---
        window.downloadPDF = () => {
            const element = document.getElementById('report-area');
            const opt = {
                margin: [10, 10],
                filename: `CSR_Strategic_Report_${new Date().toLocaleDateString()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            const style = document.createElement('style');
            style.innerHTML = ".no-export { display: none !important; }";
            document.head.appendChild(style);

            html2pdf().set(opt).from(element).save().then(() => style.remove());
        };

        // --- LOGICA DI AUTENTICAZIONE ---
        async function initAuth() {
            onAuthStateChanged(auth, (user) => {
                if (user && userProfile) { showDashboard(); } 
                else { showLogin(); }
            });
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const name = document.getElementById('login-name').value;
            if(!name) return alert("Nome obbligatorio");
            userProfile = { name, role: "CSR Manager" };
            localStorage.setItem('csr_user_profile', JSON.stringify(userProfile));
            await signInAnonymously(auth);
        };

        function showLogin() { 
            document.getElementById('login-screen').classList.remove('hidden'); 
            document.getElementById('main-dashboard').classList.add('hidden'); 
        }

        function showDashboard() { 
            document.getElementById('login-screen').classList.add('hidden'); 
            document.getElementById('main-dashboard').classList.remove('hidden'); 
            document.getElementById('user-name-display').innerText = userProfile.name;
            setupRealtimeSync(); 
        }

        function setupRealtimeSync() {
            onSnapshot(query(collection(db, 'iniziative'), orderBy('timestamp', 'desc')), (snapshot) => {
                initiatives = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUI();
            });
        }

        window.saveInitiative = async (e) => {
            e.preventDefault();
            const payload = {
                nome_iniziativa: document.getElementById('nome_iniziativa').value,
                categoria: document.getElementById('categoria').value,
                descrizione: document.getElementById('descrizione').value,
                kpi_valore: parseFloat(document.getElementById('kpi_valore').value),
                kpi_unita: document.getElementById('kpi_unita').value.toLowerCase().trim(),
                data_evento: document.getElementById('data_evento').value,
                frequenza: document.getElementById('frequenza').value,
                alert_attivo: document.getElementById('alert_attivo').checked,
                autore: userProfile.name,
                last_updated: serverTimestamp(),
                timestamp: serverTimestamp()
            };
            if (editingId) { await updateDoc(doc(db, 'iniziative', editingId), payload); editingId = null; } 
            else { await addDoc(collection(db, 'iniziative'), payload); }
            e.target.reset();
        };

        window.deleteItem = async (id) => { if(confirm("Eliminare?")) await deleteDoc(doc(db, 'iniziative', id)); };
        window.editItem = (id) => {
            const item = initiatives.find(i => i.id === id);
            editingId = id;
            document.getElementById('nome_iniziativa').value = item.nome_iniziativa;
            document.getElementById('categoria').value = item.categoria;
            document.getElementById('kpi_valore').value = item.kpi_valore;
            document.getElementById('kpi_unita').value = item.kpi_unita;
            document.getElementById('data_evento').value = item.data_evento;
            document.getElementById('frequenza').value = item.frequenza;
            document.getElementById('alert_attivo').checked = item.alert_attivo;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function updateUI() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = initiatives.map(item => `
                <tr class="border-b border-slate-50 text-[11px]">
                    <td class="p-4"><strong>${item.nome_iniziativa}</strong><br><span class="text-slate-400">${formatDate(item.data_evento)}</span></td>
                    <td class="p-4"><span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:${categoryColors[item.categoria]}"></span>${item.categoria}</span></td>
                    <td class="p-4 uppercase text-[9px] font-bold text-slate-500">${item.frequenza}</td>
                    <td class="p-4 text-right font-bold text-slate-700">${item.kpi_valore} ${item.kpi_unita}</td>
                    <td class="p-4 text-right no-export">
                        <button onclick="editItem('${item.id}')" class="text-blue-500 mr-2 hover:underline">Mod</button>
                        <button onclick="deleteItem('${item.id}')" class="text-rose-500 hover:underline">Elimina</button>
                    </td>
                </tr>`).join('');
            
            const stats = initiatives.reduce((acc, curr) => { acc[curr.categoria] = (acc[curr.categoria] || 0) + 1; return acc; }, {});
            if(charts.doughnut) charts.doughnut.destroy();
            charts.doughnut = new Chart(document.getElementById('chart-doughnut').getContext('2d'), {
                type: 'doughnut',
                data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: Object.keys(stats).map(c => categoryColors[c]), borderWidth: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } } }
            });
            renderComparisonChart();
            updateFooter();
        }

        function renderComparisonChart() {
            const groups = initiatives.reduce((acc, curr) => { const u = curr.kpi_unita; if (!acc[u]) acc[u] = []; acc[u].push(curr); return acc; }, {});
            const units = Object.keys(groups).filter(u => groups[u].length >= 2);
            if (units.length === 0) { document.getElementById('comparison-nav').classList.add('hidden'); return; }
            document.getElementById('comparison-nav').classList.remove('hidden');
            const activeUnit = units[currentUnitIndex % units.length];
            const dataSet = groups[activeUnit].sort((a,b) => new Date(a.data_evento) - new Date(b.data_evento));
            document.getElementById('current-kpi-label').innerText = `KPI: ${activeUnit.toUpperCase()}`;
            const ctx = document.getElementById('chart-comparison').getContext('2d');
            if(charts.bar) charts.bar.destroy();
            charts.bar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dataSet.map(i => `${i.nome_iniziativa} (${formatDate(i.data_evento)})`),
                    datasets: [{ data: dataSet.map(i => i.kpi_valore), backgroundColor: dataSet.map(i => categoryColors[i.categoria]), borderRadius: 4 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 8 } } } } }
            });
        }

        function updateFooter() {
            const sorted = initiatives.filter(i => i.last_updated).sort((a,b) => b.last_updated.seconds - a.last_updated.seconds);
            if (sorted.length > 0) {
                const d = sorted[0].last_updated.toDate();
                document.getElementById('footer-info').innerText = `Aggiornato: ${d.toLocaleDateString()} ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} | User: ${sorted[0].autore}`;
            }
        }

        window.logout = async () => { localStorage.removeItem('csr_user_profile'); await signOut(auth); location.reload(); };
        window.changeChart = (dir) => { currentUnitIndex = (currentUnitIndex + dir + 100) % 100; renderComparisonChart(); };
        window.onload = initAuth;
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-md hidden">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-80 text-center">
            <h2 class="text-xl font-bold mb-6">CSR Strategic Hub</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="login-name" placeholder="Tuo Nome" required class="w-full border p-3 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 text-center">
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">Accedi</button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <nav class="bg-white/80 backdrop-blur-md border-b p-4 flex justify-between items-center sticky top-0 z-10 no-export">
            <span class="font-bold text-slate-800">🌿 CSR HUB</span>
            <div class="flex items-center gap-4 text-[10px] font-bold">
                <span id="user-name-display" class="bg-slate-100 px-3 py-1.5 rounded-full uppercase">--</span>
                <button onclick="logout()" class="text-rose-500 uppercase hover:underline">Esci</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 no-export">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 sticky top-24">
                    <h3 class="font-bold mb-6 text-slate-800">📝 Inserimento Dati</h3>
                    <form id="initiative-form" onsubmit="saveInitiative(event)" class="space-y-4">
                        <input type="text" id="nome_iniziativa" placeholder="Nome Iniziativa" required class="w-full p-3 bg-slate-50 border-none rounded-xl text-sm outline-none focus:ring-2 focus:ring-emerald-500">
                        <select id="categoria" class="w-full p-3 bg-slate-50 border-none rounded-xl text-sm outline-none">
                            <option>Comunità e Ambiente</option>
                            <option>Educazione e Giovani</option>
                            <option>Salute e Inclusione</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="data_evento" required class="p-3 bg-slate-50 border-none rounded-xl text-xs outline-none">
                            <select id="frequenza" class="p-3 bg-slate-50 border-none rounded-xl text-xs outline-none">
                                <option value="singolo evento">Singolo Evento</option>
                                <option value="mensile">Mensile</option>
                                <option value="trimestrale">Trimestrale</option>
                                <option value="semestrale">Semestrale</option>
                                <option value="annuale">Annuale</option>
                            </select>
                        </div>
                        <textarea id="descrizione" placeholder="Descrizione dell'attività..." class="w-full p-3 bg-slate-50 border-none rounded-xl text-sm h-24 outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                        <div class="flex gap-2">
                            <input type="number" id="kpi_valore" placeholder="Valore" required class="w-1/2 p-3 bg-slate-50 border-none rounded-xl text-sm outline-none">
                            <input type="text" id="kpi_unita" placeholder="Unità (es: Ore, €)" required class="w-1/2 p-3 bg-slate-50 border-none rounded-xl text-sm outline-none">
                        </div>
                        <div class="flex items-center gap-3 p-3 bg-emerald-50/50 rounded-xl border border-emerald-100">
                            <input type="checkbox" id="alert_attivo" class="w-4 h-4 accent-emerald-500">
                            <label class="text-[10px] font-bold text-emerald-800">ATTIVA ALERT SCADENZA</label>
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg shadow-slate-200 active:scale-95 transition-all">Salva Attività</button>
                    </form>
                </div>
            </aside>

            <div id="report-area" class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 h-72 shadow-sm">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Mix Strategico</h4>
                        <div class="h-48"><canvas id="chart-doughnut"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 h-72 shadow-sm flex flex-col">
                        <div id="comparison-nav" class="flex justify-between items-center mb-4 no-export">
                            <button onclick="changeChart(-1)" class="w-7 h-7 bg-slate-50 rounded-full text-xs hover:bg-slate-100">◀</button>
                            <h4 id="current-kpi-label" class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest"></h4>
                            <button onclick="changeChart(1)" class="w-7 h-7 bg-slate-50 rounded-full text-xs hover:bg-slate-100">▶</button>
                        </div>
                        <div class="flex-grow"><canvas id="chart-comparison"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm">
                    <div class="p-6 border-b border-slate-50 flex justify-between items-center no-export">
                        <h3 class="font-bold text-slate-800 text-sm">Registro Operativo</h3>
                        <div class="flex gap-2">
                            <button onclick="exportToExcel()" class="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-emerald-100">Export CSV/Excel</button>
                            <button onclick="downloadPDF()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-800">Scarica Report PDF</button>
                        </div>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-[9px] uppercase text-slate-400 font-bold tracking-widest">
                            <tr>
                                <th class="p-4">Attività</th>
                                <th class="p-4">Area Area</th>
                                <th class="p-4">Ciclo</th>
                                <th class="p-4 text-right">Impatto</th>
                                <th class="p-4 text-right no-export">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t px-6 py-4 text-[10px] text-slate-400 flex justify-center no-export">
        <span id="footer-info" class="italic font-medium">Connessione al database attiva...</span>
    </footer>

</body>
</html>
