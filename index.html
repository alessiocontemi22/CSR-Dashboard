<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR Strategic Hub - Intelligence v3.5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAabpS43j9KDSqJ8V7Vv5PfRvpZ4DvSSEk",
            authDomain: "csr-dashboard-5e613.firebaseapp.com",
            projectId: "csr-dashboard-5e613",
            storageBucket: "csr-dashboard-5e613.firebasestorage.app",
            messagingSenderId: "662684708122",
            appId: "1:662684708122:web:6e17a3bd8e31ff18be10a3",
            measurementId: "G-HQV1X5DELN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        Chart.register(ChartDataLabels);

        let userProfile = JSON.parse(localStorage.getItem('csr_user_profile')) || null;
        let initiatives = [];
        let charts = { doughnut: null, bar: null };
        let currentUnitIndex = 0;
        let editingId = null;

        const categoryColors = {
            "Comunità e Ambiente": "#059669",
            "Educazione e Giovani": "#2563eb",
            "Salute e Inclusione": "#d97706"
        };

        const formatDate = (d) => d ? d.split('-').reverse().join('/') : '--';

        // --- LOGICA SCADENZA ---
        const getExpiryStatus = (item, allInitiatives) => {
            const hasNewer = allInitiatives.some(i => 
                i.nome_iniziativa === item.nome_iniziativa && 
                new Date(i.data_evento) > new Date(item.data_evento)
            );

            if (hasNewer) return `<span class="text-emerald-600 font-bold text-[7px] uppercase italic">Rinnovata</span>`;
            if (!item.alert_attivo) return "";

            const eventDate = new Date(item.data_evento);
            let nextDue = new Date(eventDate);
            if (item.frequenza === "Mensile") nextDue.setMonth(nextDue.getMonth() + 1);
            else if (item.frequenza === "Trimestrale") nextDue.setMonth(nextDue.getMonth() + 3);
            else if (item.frequenza === "Annuale") nextDue.setFullYear(nextDue.getFullYear() + 1);
            else return "";

            const today = new Date();
            today.setHours(0,0,0,0);
            const diffDays = Math.ceil((nextDue - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return `<span class="text-rose-600 font-black text-[7px] uppercase">Scaduta da ${Math.abs(diffDays)}g</span>`;
            if (diffDays === 0) return `<span class="text-rose-500 font-black animate-pulse text-[7px] uppercase">Scade Oggi</span>`;
            return `<span class="text-amber-600 font-bold text-[7px] uppercase tracking-tighter">Scade tra ${diffDays}g</span>`;
        };

        // --- CRUD ACTIONS ---
        window.deleteInitiative = async (id) => {
            if(confirm("Sei sicuro di voler eliminare questo record?")) {
                await deleteDoc(doc(db, "iniziative", id));
            }
        };

        window.editInitiative = (id) => {
            const item = initiatives.find(i => i.id === id);
            if(!item) return;
            editingId = id;
            document.getElementById('nome_iniziativa').value = item.nome_iniziativa;
            document.getElementById('categoria').value = item.categoria;
            document.getElementById('descrizione').value = item.descrizione;
            document.getElementById('kpi_valore').value = item.kpi_valore;
            document.getElementById('kpi_unita').value = item.kpi_unita;
            document.getElementById('data_evento').value = item.data_evento;
            document.getElementById('frequenza').value = item.frequenza;
            document.getElementById('alert_attivo').checked = item.alert_attivo;

            const btn = document.getElementById('submit-btn');
            btn.innerText = "Aggiorna Record";
            btn.classList.replace('bg-slate-900', 'bg-blue-600');
            document.getElementById('form-title').innerText = "Modifica Attività";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.saveInitiative = async (e) => {
            e.preventDefault();
            const payload = {
                nome_iniziativa: document.getElementById('nome_iniziativa').value,
                categoria: document.getElementById('categoria').value,
                descrizione: document.getElementById('descrizione').value,
                kpi_valore: parseFloat(document.getElementById('kpi_valore').value),
                kpi_unita: document.getElementById('kpi_unita').value,
                data_evento: document.getElementById('data_evento').value,
                frequenza: document.getElementById('frequenza').value,
                alert_attivo: document.getElementById('alert_attivo').checked,
                autore: userProfile.name,
                last_updated: serverTimestamp()
            };

            if (editingId) {
                await updateDoc(doc(db, "iniziative", editingId), payload);
                editingId = null;
                document.getElementById('submit-btn').innerText = "Salva";
                document.getElementById('submit-btn').classList.replace('bg-blue-600', 'bg-slate-900');
                document.getElementById('form-title').innerText = "Registra Attività";
            } else {
                payload.timestamp = serverTimestamp();
                await addDoc(collection(db, 'iniziative'), payload);
            }
            e.target.reset();
        };

        // --- EXPORT & PDF ---
        window.exportToExcel = () => {
            let csv = "\uFEFFIniziativa,Area,Data,Valore,Unita,Frequenza,Autore\n";
            initiatives.forEach(i => {
                csv += `"${i.nome_iniziativa}","${i.categoria}","${i.data_evento}","${i.kpi_valore}","${i.kpi_unita}","${i.frequenza}","${i.autore}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Export_CSR_Data.csv`;
            link.click();
        };

        window.downloadPDF = async () => {
            const element = document.getElementById('report-container');
            const opt = { margin: 10, filename: 'CSR_Strategy_Report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            await html2pdf().set(opt).from(element).save();
        };

        // --- UI UPDATE ---
        function updateUI() {
            // Highlights
            const totals = initiatives.reduce((acc, curr) => {
                const key = curr.kpi_unita.toUpperCase();
                if (!acc[key]) acc[key] = { val: 0, cat: curr.categoria };
                acc[key].val += curr.kpi_valore;
                return acc;
            }, {});
            document.getElementById('impact-highlights').innerHTML = Object.entries(totals).slice(0, 3).map(([unit, data]) => `
                <div class="impact-card bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Impact Goal</p>
                    <div class="flex items-baseline gap-1"><span class="text-2xl font-black text-slate-900">${data.val.toLocaleString()}</span><span class="text-[10px] font-bold text-slate-500">${unit}</span></div>
                    <div class="mt-3 py-1 px-3 rounded-lg inline-flex items-center gap-2" style="background: ${categoryColors[data.cat]}15"><span class="w-1.5 h-1.5 rounded-full" style="background:${categoryColors[data.cat]}"></span><span class="text-[8px] font-black uppercase" style="color:${categoryColors[data.cat]}">${data.cat}</span></div>
                </div>`).join('');

            // Tabella
            document.getElementById('table-body').innerHTML = initiatives.map(item => `
                <tr class="border-b border-slate-100 group">
                    <td class="p-4 w-1/3">
                        <div class="flex items-center gap-2">
                            <div class="font-bold text-slate-900 text-xs">${item.nome_iniziativa}</div>
                            <div class="hidden group-hover:flex gap-1 no-export">
                                <button onclick="editInitiative('${item.id}')" class="text-[10px] bg-slate-50 p-1 rounded hover:bg-blue-100">✏️</button>
                                <button onclick="deleteInitiative('${item.id}')" class="text-[10px] bg-slate-50 p-1 rounded hover:bg-red-100">🗑️</button>
                            </div>
                        </div>
                        <div class="font-serif text-[10px] text-slate-400 leading-tight mt-1">
                            <span class="font-sans font-black text-slate-500 mr-1">${formatDate(item.data_evento)}</span> — ${item.descrizione || '...'}
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="inline-block px-3 py-1.5 rounded-lg text-[9px] font-black text-white min-w-[130px]" style="background:${categoryColors[item.categoria]};">
                            ${item.categoria.toUpperCase()}
                        </div>
                    </td>
                    <td class="p-4 text-center font-bold text-[9px] text-slate-500 uppercase">${item.frequenza}</td>
                    <td class="p-4 text-right">
                        <div class="text-xs font-black text-slate-800">${item.kpi_valore} ${item.kpi_unita}</div>
                        <div class="mt-1">${getExpiryStatus(item, initiatives)}</div>
                    </td>
                </tr>`).join('');

            // FOOTER DINAMICO
            const sorted = initiatives.filter(i => i.last_updated).sort((a,b) => b.last_updated?.seconds - a.last_updated?.seconds);
            if (sorted.length > 0) {
                const last = sorted[0].last_updated.toDate();
                document.getElementById('footer-info').innerHTML = `ULTIMO AGGIORNAMENTO: <b>${last.toLocaleDateString()} ${last.toLocaleTimeString()}</b> | OPERATORE: <b>${sorted[0].autore.toUpperCase()}</b>`;
            }

            renderDoughnut();
            renderComparisonChart();
        }

        // --- CHARTING ---
        function renderComparisonChart() {
            const nameCounts = initiatives.reduce((acc, curr) => { acc[curr.nome_iniziativa] = (acc[curr.nome_iniziativa] || 0) + 1; return acc; }, {});
            const repeated = initiatives.filter(i => nameCounts[i.nome_iniziativa] > 1);
            const groups = repeated.reduce((acc, curr) => { 
                const u = curr.kpi_unita.toUpperCase(); 
                if (!acc[u]) acc[u] = []; 
                acc[u].push(curr); 
                return acc; 
            }, {});

            const units = Object.keys(groups);
            const container = document.getElementById('chart-bar-container');
            if (units.length === 0) {
                container.innerHTML = `<div class="flex items-center justify-center h-full text-[9px] text-slate-400 font-bold uppercase text-center p-10 leading-relaxed">Nessun confronto disponibile. Inserisci più record per la stessa attività.</div>`;
                return;
            }
            container.innerHTML = `<canvas id="chart-comparison"></canvas>`;
            const activeUnit = units[currentUnitIndex % units.length];
            const dataSet = groups[activeUnit].sort((a,b) => new Date(a.data_evento) - new Date(b.data_evento));
            document.getElementById('current-kpi-label').innerText = `STORICO KPI: ${activeUnit}`;
            
            const ctx = document.getElementById('chart-comparison').getContext('2d');
            if(charts.bar) charts.bar.destroy();
            charts.bar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dataSet.map(i => [i.nome_iniziativa, `(${formatDate(i.data_evento)})`]),
                    datasets: [{ data: dataSet.map(i => i.kpi_valore), backgroundColor: dataSet.map(i => categoryColors[i.categoria]), borderRadius: 6 }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    layout: { padding: { top: 35 } },
                    plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'top', offset: 2, color: '#1e293b', font: { weight: 'black', size: 10 } } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 8, weight: 'bold' } } } }
                }
            });
        }

        function renderDoughnut() {
            const stats = initiatives.reduce((acc, curr) => { acc[curr.categoria] = (acc[curr.categoria] || 0) + 1; return acc; }, {});
            document.getElementById('center-total').innerText = initiatives.length;
            const ctx = document.getElementById('chart-doughnut').getContext('2d');
            if(charts.doughnut) charts.doughnut.destroy();
            charts.doughnut = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: Object.keys(stats).map(c => categoryColors[c]), borderWidth: 0 }] },
                options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false }, datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, formatter: (v, c) => Math.round((v * 100) / c.dataset.data.reduce((a,b) => a+b, 0)) + "%" } } }
            });
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            userProfile = { name: document.getElementById('login-name').value };
            localStorage.setItem('csr_user_profile', JSON.stringify(userProfile));
            await signInAnonymously(auth);
            location.reload();
        };

        window.onload = () => {
            if(userProfile) {
                document.getElementById('main-dashboard').classList.remove('hidden');
                onSnapshot(query(collection(db, 'iniziative'), orderBy('timestamp', 'desc')), (snap) => {
                    initiatives = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateUI();
                });
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };
        window.changeChart = (dir) => { currentUnitIndex += dir; if(currentUnitIndex<0) currentUnitIndex=0; renderComparisonChart(); };
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Lora:ital@0;1&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; }
        .font-serif { font-family: 'Lora', serif; }
        @media print { .no-export { display: none !important; } }
    </style>
</head>
<body class="pb-24">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/10 backdrop-blur-md hidden">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-96 text-center">
            <h2 class="text-2xl font-black mb-8 tracking-tighter">CSR HUB</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="login-name" placeholder="Nome Operatore" required class="w-full bg-slate-50 border-none p-4 rounded-2xl text-center font-bold outline-none">
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl">Entra</button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-6 flex justify-between items-center sticky top-0 z-40 no-export">
            <span class="font-black text-xs tracking-[0.3em] uppercase text-slate-900">CSR Strategic Hub</span>
            <button onclick="downloadPDF()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Esporta Report PDF</button>
        </nav>

        <main class="max-w-6xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div id="report-container" class="lg:col-span-8 space-y-12">
                <section>
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Indicatori di Impatto</h3>
                    <div id="impact-highlights" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
                </section>

                <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative h-80">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Focus Strategico</h4>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-6">
                            <span id="center-total" class="text-3xl font-black text-slate-900">0</span>
                            <span class="text-[8px] font-bold text-slate-400 uppercase">Input</span>
                        </div>
                        <div class="h-52"><canvas id="chart-doughnut"></canvas></div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm h-80 flex flex-col">
                        <div class="flex justify-between items-center no-export">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Growth Trend</h4>
                            <div class="flex gap-1">
                                <button onclick="changeChart(-1)" class="p-1.5 bg-slate-50 rounded-lg text-xs hover:bg-slate-100 transition-colors">◀</button>
                                <button onclick="changeChart(1)" class="p-1.5 bg-slate-50 rounded-lg text-xs hover:bg-slate-100 transition-colors">▶</button>
                            </div>
                        </div>
                        <h5 id="current-kpi-label" class="text-[9px] font-black text-emerald-600 uppercase mt-2 mb-2 tracking-tighter">--</h5>
                        <div id="chart-bar-container" class="flex-grow"></div>
                    </div>
                </section>

                <section class="bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                        <h3 class="font-black text-xs tracking-tighter uppercase text-slate-900">Registro Attività e Scadenziario</h3>
                        <button onclick="exportToExcel()" class="no-export bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-emerald-100 transition-colors">Scarica CSV</button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                            <tr>
                                <th class="p-5">Iniziativa & Storytelling</th>
                                <th class="p-5 text-center">Pilastro</th>
                                <th class="p-5 text-center">Frequenza</th>
                                <th class="p-5 text-right">KPI & Scadenza</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </section>
            </div>

            <aside class="lg:col-span-4 no-export">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 sticky top-32">
                    <h3 id="form-title" class="font-black text-lg mb-6 tracking-tighter text-slate-800">Registra Attività</h3>
                    <form id="initiative-form" onsubmit="saveInitiative(event)" class="space-y-4">
                        <input type="text" id="nome_iniziativa" placeholder="Nome Attività" required class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-slate-900">
                        <select id="categoria" class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold outline-none">
                            <option>Comunità e Ambiente</option>
                            <option>Educazione e Giovani</option>
                            <option>Salute e Inclusione</option>
                        </select>
                        <textarea id="descrizione" placeholder="Descrizione dell'impatto..." class="w-full p-4 bg-slate-50 rounded-2xl text-sm font-serif h-24 outline-none"></textarea>
                        <div class="flex gap-2">
                            <input type="number" id="kpi_valore" placeholder="Valore" required class="w-2/3 p-4 bg-slate-50 rounded-2xl text-sm font-bold">
                            <input type="text" id="kpi_unita" placeholder="Unità" required class="w-1/3 p-4 bg-slate-50 rounded-2xl text-sm font-bold">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="data_evento" required class="p-4 bg-slate-50 rounded-2xl text-[10px] font-bold">
                            <select id="frequenza" class="p-4 bg-slate-50 rounded-2xl text-[10px] font-bold">
                                <option>Mensile</option><option>Trimestrale</option><option>Annuale</option><option>Evento Singolo</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-3 p-4 bg-amber-50 rounded-2xl border border-amber-100">
                            <input type="checkbox" id="alert_attivo" class="w-4 h-4 accent-amber-600">
                            <label class="text-[9px] font-black text-amber-800 uppercase tracking-widest">Pianifica Rinnovo</label>
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:opacity-90 transition-all">Salva</button>
                    </form>
                </div>
            </aside>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-8 py-4 text-[8px] text-slate-400 flex justify-between items-center z-50 no-export">
        <span id="footer-info" class="font-bold uppercase tracking-widest">Sincronizzazione in corso...</span>
        <span class="font-black text-slate-800 uppercase tracking-widest">CSR Strategic Hub © 2026</span>
    </footer>

</body>
</html>
