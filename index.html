<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR Strategic Hub - Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAabpS43j9KDSqJ8V7Vv5PfRvpZ4DvSSEk",
            authDomain: "csr-dashboard-5e613.firebaseapp.com",
            projectId: "csr-dashboard-5e613",
            storageBucket: "csr-dashboard-5e613.firebasestorage.app",
            messagingSenderId: "662684708122",
            appId: "1:662684708122:web:6e17a3bd8e31ff18be10a3",
            measurementId: "G-HQV1X5DELN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = JSON.parse(localStorage.getItem('csr_user_profile')) || null;
        let initiatives = [];
        let charts = { doughnut: null, bar: null };
        let editingId = null;
        let currentUnitIndex = 0;

        // --- 2) COLORI CATEGORIE RICHIESTI ---
        const categoryColors = {
            "Comunità e Ambiente": "#10b981", // Verde
            "Educazione e Giovani": "#3b82f6", // Blu
            "Salute e Inclusione": "#f59e0b"   // Arancione
        };

        // --- 1) FORMATO DATA gg/mm/aaaa ---
        function formatDate(dateString) {
            if (!dateString) return "N/D";
            const [year, month, day] = dateString.split("-");
            return `${day}/${month}/${year}`;
        }

        async function initAuth() {
            onAuthStateChanged(auth, (user) => {
                if (user && userProfile) {
                    showDashboard();
                } else {
                    showLogin();
                }
            });
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const name = document.getElementById('login-name').value;
            const role = document.getElementById('login-role').value;
            
            if(!name) return alert("Inserisci il tuo nome");

            userProfile = { name, role };
            localStorage.setItem('csr_user_profile', JSON.stringify(userProfile));
            await signInAnonymously(auth);
        };

        function showLogin() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = userProfile.name;
            setupRealtimeSync();
        }

        function setupRealtimeSync() {
            const q = query(collection(db, 'iniziative'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                initiatives = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUI();
            });
        }

        window.saveInitiative = async (e) => {
            e.preventDefault();
            const payload = {
                nome_iniziativa: document.getElementById('nome_iniziativa').value,
                categoria: document.getElementById('categoria').value,
                descrizione: document.getElementById('descrizione').value,
                kpi_valore: parseFloat(document.getElementById('kpi_valore').value),
                kpi_unita: document.getElementById('kpi_unita').value.toLowerCase().trim(),
                data_evento: document.getElementById('data_evento').value,
                frequenza: document.getElementById('frequenza').value,
                alert_attivo: document.getElementById('alert_attivo').checked,
                autore: userProfile.name,
                last_updated: serverTimestamp()
            };

            if (editingId) {
                await updateDoc(doc(db, 'iniziative', editingId), payload);
                editingId = null;
                document.querySelector('#initiative-form button').innerText = "Registra Iniziativa";
            } else {
                payload.timestamp = serverTimestamp();
                await addDoc(collection(db, 'iniziative'), payload);
            }
            e.target.reset();
        };

        window.deleteItem = async (id) => { if(confirm("Eliminare definitivamente?")) await deleteDoc(doc(db, 'iniziative', id)); };

        window.editItem = (id) => {
            const item = initiatives.find(i => i.id === id);
            editingId = id;
            document.getElementById('nome_iniziativa').value = item.nome_iniziativa;
            document.getElementById('categoria').value = item.categoria;
            document.getElementById('kpi_valore').value = item.kpi_valore;
            document.getElementById('kpi_unita').value = item.kpi_unita;
            document.getElementById('data_evento').value = item.data_evento;
            document.getElementById('frequenza').value = item.frequenza;
            document.getElementById('alert_attivo').checked = item.alert_attivo;
            document.querySelector('#initiative-form button').innerText = "Aggiorna Modifiche";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function getDeadlineInfo(item) {
            if (!item.alert_attivo || !item.data_evento || item.frequenza === 'singolo evento') return null;
            const dataInizio = new Date(item.data_evento);
            const oggi = new Date();
            let scadenza = new Date(dataInizio);
            const config = { "mensile": { mesi: 1, pre: 10 }, "trimestrale": { mesi: 3, pre: 20 }, "semestrale": { mesi: 6, pre: 30 }, "annuale": { mesi: 12, pre: 60 } };
            const conf = config[item.frequenza];
            if (!conf) return null;
            scadenza.setMonth(scadenza.getMonth() + conf.mesi);
            const diff = Math.ceil((scadenza - oggi) / (1000 * 60 * 60 * 24));
            if (diff <= conf.pre && diff > 0) return { giorni: diff };
            if (diff <= 0) return { scaduto: true };
            return null;
        }

        window.changeChart = (dir) => {
            currentUnitIndex += dir;
            renderComparisonChart();
        };

        function renderComparisonChart() {
            const groups = initiatives.reduce((acc, curr) => {
                const unit = curr.kpi_unita;
                if (!acc[unit]) acc[unit] = [];
                acc[unit].push(curr);
                return acc;
            }, {});

            const unitsToCompare = Object.keys(groups).filter(u => groups[u].length >= 2);
            const container = document.getElementById('comparison-nav');
            if (unitsToCompare.length === 0) { container.classList.add('hidden'); if(charts.bar) charts.bar.destroy(); return; }

            container.classList.remove('hidden');
            if (currentUnitIndex < 0) currentUnitIndex = unitsToCompare.length - 1;
            if (currentUnitIndex >= unitsToCompare.length) currentUnitIndex = 0;

            const activeUnit = unitsToCompare[currentUnitIndex];
            const dataSet = groups[activeUnit].sort((a,b) => new Date(a.data_evento) - new Date(b.data_evento));

            document.getElementById('current-kpi-label').innerText = `KPI: ${activeUnit.toUpperCase()}`;

            const ctx = document.getElementById('chart-comparison').getContext('2d');
            if(charts.bar) charts.bar.destroy();

            charts.bar = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dataSet.map(i => `${i.nome_iniziativa} (${formatDate(i.data_evento)})`),
                    datasets: [{
                        data: dataSet.map(i => i.kpi_valore),
                        backgroundColor: dataSet.map(i => categoryColors[i.categoria] || '#cbd5e1'),
                        borderRadius: 6
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { ticks: { font: { size: 9 }, autoSkip: false, maxRotation: 45 } }, y: { beginAtZero: true } }
                }
            });
        }

        function updateUI() {
            renderTable();
            renderDoughnutChart();
            renderComparisonChart();
            updateFooter();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = initiatives.map(item => {
                const alert = getDeadlineInfo(item);
                const badge = alert ? (alert.scaduto ? `<span class="text-rose-600 font-bold text-[9px]">⚠️ SCADUTO</span>` : `<span class="text-amber-600 font-bold text-[9px]">⏰ -${alert.giorni} GG</span>`) : '';
                return `
                <tr class="border-b border-slate-50 text-xs">
                    <td class="p-4"><strong>${item.nome_iniziativa}</strong><br><span class="text-slate-400 font-medium">${formatDate(item.data_evento)}</span></td>
                    <td class="p-4"><span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:${categoryColors[item.categoria]}"></span>${item.categoria}</span></td>
                    <td class="p-4">${item.frequenza} ${badge}</td>
                    <td class="p-4 text-right font-bold text-slate-700">${item.kpi_valore} ${item.kpi_unita}</td>
                    <td class="p-4 text-right">
                        <button onclick="editItem('${item.id}')" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded">Mod</button>
                        <button onclick="deleteItem('${item.id}')" class="text-rose-500 hover:bg-rose-50 px-2 py-1 rounded">Elimina</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderDoughnutChart() {
            const stats = initiatives.reduce((acc, curr) => { acc[curr.categoria] = (acc[curr.categoria] || 0) + 1; return acc; }, {});
            const ctx = document.getElementById('chart-doughnut').getContext('2d');
            if(charts.doughnut) charts.doughnut.destroy();
            charts.doughnut = new Chart(ctx, {
                type: 'doughnut',
                data: { 
                    labels: Object.keys(stats), 
                    datasets: [{ 
                        data: Object.values(stats), 
                        backgroundColor: Object.keys(stats).map(cat => categoryColors[cat] || '#cbd5e1'),
                        borderWidth: 0
                    }] 
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });
        }

        function updateFooter() {
            if (initiatives.length === 0) return;
            const sorted = initiatives.filter(i => i.last_updated).sort((a,b) => b.last_updated.seconds - a.last_updated.seconds);
            if (sorted.length > 0) {
                const latest = sorted[0];
                const date = latest.last_updated.toDate();
                const day = String(date.getDate()).padStart(2, '0');
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('footer-info').innerText = `Ultima modifica: ${day}/${month}/${year} ore ${time} | Autore: ${latest.autore}`;
            }
        }

        window.logout = async () => {
            localStorage.removeItem('csr_user_profile');
            await signOut(auth);
            location.reload(); // Ora ricaricherà correttamente sulla schermata login
        };
        
        window.onload = initAuth;
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-80 border border-slate-100">
            <div class="text-3xl text-center mb-4">🌿</div>
            <h2 class="text-xl font-bold mb-6 text-center text-slate-800">CSR Strategic Hub</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="login-name" placeholder="Il tuo Nome" class="w-full border border-slate-200 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                <select id="login-role" class="w-full border border-slate-200 p-3 rounded-2xl outline-none bg-slate-50">
                    <option>CSR Manager</option>
                    <option>Analyst</option>
                </select>
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">Entra nel Sistema</button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden flex-grow pb-20">
        <nav class="bg-white/80 backdrop-blur-md border-b p-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <span class="font-bold text-slate-800 tracking-tight flex items-center gap-2">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                    CSR DASHBOARD
                </span>
            </div>
            <div class="flex items-center gap-4 text-[10px] font-bold">
                <span id="user-name-display" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full uppercase tracking-tighter">--</span>
                <button onclick="logout()" class="text-rose-500 uppercase tracking-widest hover:underline">Esci</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="font-bold mb-6 text-slate-800 flex items-center gap-2">
                        <span class="text-lg">📝</span> Registra Iniziativa
                    </h3>
                    <form id="initiative-form" onsubmit="saveInitiative(event)" class="space-y-4">
                        <input type="text" id="nome_iniziativa" placeholder="Nome Attività" required class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-emerald-500">
                        
                        <select id="categoria" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none">
                            <option>Comunità e Ambiente</option>
                            <option>Educazione e Giovani</option>
                            <option>Salute e Inclusione</option>
                        </select>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[9px] font-bold text-slate-400 mb-1 block ml-1">DATA INIZIO</label>
                                <input type="date" id="data_evento" required class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-slate-400 mb-1 block ml-1">FREQUENZA</label>
                                <select id="frequenza" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none">
                                    <option value="singolo evento">Singolo Evento</option>
                                    <option value="mensile">Mensile</option>
                                    <option value="trimestrale">Trimestrale</option>
                                    <option value="semestrale">Semestrale</option>
                                    <option value="annuale">Annuale</option>
                                </select>
                            </div>
                        </div>

                        <textarea id="descrizione" placeholder="Note aggiuntive..." class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm h-20 outline-none"></textarea>
                        
                        <div class="flex gap-2">
                            <input type="number" id="kpi_valore" placeholder="Valore" required class="w-1/2 p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none">
                            <input type="text" id="kpi_unita" placeholder="Unità" required class="w-1/2 p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none">
                        </div>

                        <div class="flex items-center gap-3 p-3 bg-emerald-50/50 rounded-xl border border-emerald-100">
                            <input type="checkbox" id="alert_attivo" class="w-4 h-4 accent-emerald-500">
                            <label for="alert_attivo" class="text-[10px] font-bold text-emerald-800">ATTIVA AVVISI DI SCADENZA</label>
                        </div>

                        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all">
                            Salva Iniziativa
                        </button>
                    </form>
                </div>
            </aside>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 h-72 shadow-sm">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Mix Strategico</h4>
                        <div class="h-48"><canvas id="chart-doughnut"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 h-72 shadow-sm flex flex-col">
                        <div id="comparison-nav" class="flex justify-between items-center mb-4 hidden">
                            <button onclick="changeChart(-1)" class="w-7 h-7 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-full text-xs transition-colors">◀</button>
                            <h4 id="current-kpi-label" class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest"></h4>
                            <button onclick="changeChart(1)" class="w-7 h-7 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-full text-xs transition-colors">▶</button>
                        </div>
                        <div class="flex-grow"><canvas id="chart-comparison"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-[9px] uppercase text-slate-400 font-bold tracking-widest">
                            <tr>
                                <th class="p-4">Attività</th>
                                <th class="p-4">Area</th>
                                <th class="p-4">Frequenza</th>
                                <th class="p-4 text-right">Impatto</th>
                                <th class="p-4 text-right">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t px-6 py-4 text-[10px] text-slate-400 flex justify-center items-center z-20">
        <div class="flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(52,211,153,0.5)]"></span>
            <span id="footer-info" class="italic font-medium">In attesa di sincronizzazione...</span>
        </div>
    </footer>

</body>
</html>
