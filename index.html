<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR Strategic Hub - Pro Evolution</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAabpS43j9KDSqJ8V7Vv5PfRvpZ4DvSSEk",
            authDomain: "csr-dashboard-5e613.firebaseapp.com",
            projectId: "csr-dashboard-5e613",
            storageBucket: "csr-dashboard-5e613.firebasestorage.app",
            messagingSenderId: "662684708122",
            appId: "1:662684708122:web:6e17a3bd8e31ff18be10a3",
            measurementId: "G-HQV1X5DELN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userProfile = JSON.parse(localStorage.getItem('csr_user_profile')) || null;
        let initiatives = [];
        let charts = { doughnut: null, bar: null };
        let editingId = null;
        let currentUnitIndex = 0; // Per scorrere i grafici KPI

        async function initAuth() {
            onAuthStateChanged(auth, (user) => {
                if (user && userProfile) { showDashboard(); } 
                else { showLogin(); }
            });
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            userProfile = { 
                name: document.getElementById('login-name').value, 
                role: document.getElementById('login-role').value 
            };
            await signInAnonymously(auth);
            localStorage.setItem('csr_user_profile', JSON.stringify(userProfile));
            showDashboard();
        };

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = userProfile.name;
            setupRealtimeSync();
        }

        function setupRealtimeSync() {
            const q = query(collection(db, 'iniziative'), orderBy('timestamp', 'desc'));
            onSnapshot(q, (snapshot) => {
                initiatives = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUI();
            });
        }

        window.saveInitiative = async (e) => {
            e.preventDefault();
            const payload = {
                nome_iniziativa: document.getElementById('nome_iniziativa').value,
                categoria: document.getElementById('categoria').value,
                descrizione: document.getElementById('descrizione').value,
                kpi_valore: parseFloat(document.getElementById('kpi_valore').value),
                kpi_unita: document.getElementById('kpi_unita').value.toLowerCase().trim(),
                data_evento: document.getElementById('data_evento').value,
                frequenza: document.getElementById('frequenza').value,
                alert_attivo: document.getElementById('alert_attivo').checked,
                autore: userProfile.name,
                last_updated: serverTimestamp()
            };

            if (editingId) {
                await updateDoc(doc(db, 'iniziative', editingId), payload);
                editingId = null;
                document.querySelector('#initiative-form button').innerText = "Registra Iniziativa";
            } else {
                payload.timestamp = serverTimestamp();
                await addDoc(collection(db, 'iniziative'), payload);
            }
            e.target.reset();
        };

        window.deleteItem = async (id) => { if(confirm("Eliminare?")) await deleteDoc(doc(db, 'iniziative', id)); };

        window.editItem = (id) => {
            const item = initiatives.find(i => i.id === id);
            editingId = id;
            document.getElementById('nome_iniziativa').value = item.nome_iniziativa;
            document.getElementById('kpi_valore').value = item.kpi_valore;
            document.getElementById('kpi_unita').value = item.kpi_unita;
            document.getElementById('data_evento').value = item.data_evento;
            document.getElementById('frequenza').value = item.frequenza;
            document.getElementById('alert_attivo').checked = item.alert_attivo;
            document.querySelector('#initiative-form button').innerText = "Aggiorna Modifiche";
        };

        // --- 1) LOGICA ALERT DIFFERENZIATA ---
        function getDeadlineInfo(item) {
            if (!item.alert_attivo || !item.data_evento || item.frequenza === 'singolo evento') return null;

            const dataInizio = new Date(item.data_evento);
            const oggi = new Date();
            let scadenza = new Date(dataInizio);

            const config = {
                "mensile": { mesi: 1, preavviso: 10 },
                "trimestrale": { mesi: 3, preavviso: 20 },
                "semestrale": { mesi: 6, preavviso: 30 },
                "annuale": { mesi: 12, preavviso: 60 }
            };

            const conf = config[item.frequenza];
            if (!conf) return null;

            scadenza.setMonth(scadenza.getMonth() + conf.mesi);
            const diffGiorni = Math.ceil((scadenza - oggi) / (1000 * 60 * 60 * 24));

            if (diffGiorni <= conf.preavviso && diffGiorni > 0) return { giorni: diffGiorni };
            if (diffGiorni <= 0) return { scaduto: true };
            return null;
        }

        // --- 2) GRAFICO COMPARATIVO CON NAVIGAZIONE ---
        window.changeChart = (dir) => {
            currentUnitIndex += dir;
            renderComparisonChart();
        };

        function renderComparisonChart() {
            // Raggruppa per unità
            const groups = initiatives.reduce((acc, curr) => {
                const unit = curr.kpi_unita;
                if (!acc[unit]) acc[unit] = [];
                acc[unit].push(curr);
                return acc;
            }, {});

            // Filtra solo unità con almeno 2 iniziative
            const unitsToCompare = Object.keys(groups).filter(u => groups[u].length >= 2);
            const container = document.getElementById('comparison-nav');
            
            if (unitsToCompare.length === 0) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            // Gestione loop indice
            if (currentUnitIndex < 0) currentUnitIndex = unitsToCompare.length - 1;
            if (currentUnitIndex >= unitsToCompare.length) currentUnitIndex = 0;

            const activeUnit = unitsToCompare[currentUnitIndex];
            const dataSet = groups[activeUnit].sort((a,b) => new Date(a.data_evento) - new Date(b.data_evento));

            document.getElementById('current-kpi-label').innerText = `Analisi: ${activeUnit.toUpperCase()}`;

            const ctx = document.getElementById('chart-comparison').getContext('2d');
            if(charts.bar) charts.bar.destroy();

            charts.bar = new Chart(ctx, {
                type: 'bar',
                data: {
                    // Label con Nome + Data
                    labels: dataSet.map(i => `${i.nome_iniziativa} (${i.data_evento})`),
                    datasets: [{
                        label: activeUnit,
                        data: dataSet.map(i => i.kpi_valore),
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { ticks: { font: { size: 9 } } } }
                }
            });
        }

        function updateUI() {
            renderTable();
            renderDoughnutChart();
            renderComparisonChart();
            updateFooter();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = initiatives.map(item => {
                const alert = getDeadlineInfo(item);
                const badge = alert ? (alert.scaduto ? `<span class="text-rose-600 font-bold text-[9px]">⚠️ SCADUTO</span>` : `<span class="text-amber-600 font-bold text-[9px]">⏰ -${alert.giorni} GG</span>`) : '';
                return `
                <tr class="border-b border-slate-50 text-sm">
                    <td class="p-4"><strong>${item.nome_iniziativa}</strong><br><span class="text-[10px] text-slate-400">${item.data_evento}</span></td>
                    <td class="p-4 font-medium">${item.categoria}</td>
                    <td class="p-4">${item.frequenza} ${badge}</td>
                    <td class="p-4 text-right font-bold">${item.kpi_valore} ${item.kpi_unita}</td>
                    <td class="p-4 text-right"><button onclick="editItem('${item.id}')" class="text-blue-500 mr-2">Mod</button><button onclick="deleteItem('${item.id}')" class="text-rose-500">Elimina</button></td>
                </tr>`;
            }).join('');
        }

        function renderDoughnutChart() {
            const stats = initiatives.reduce((acc, curr) => { acc[curr.categoria] = (acc[curr.categoria] || 0) + 1; return acc; }, {});
            const ctx = document.getElementById('chart-doughnut').getContext('2d');
            if(charts.doughnut) charts.doughnut.destroy();
            charts.doughnut = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'] }] },
                options: { maintainAspectRatio: false }
            });
        }

        // --- 3) FOOTER DINAMICO ---
        function updateFooter() {
            if (initiatives.length === 0) return;
            // Trova l'iniziativa con l'aggiornamento più recente
            const latest = [...initiatives].sort((a,b) => (b.last_updated?.seconds || 0) - (a.last_updated?.seconds || 0))[0];
            if (latest && latest.last_updated) {
                const date = latest.last_updated.toDate();
                document.getElementById('footer-info').innerText = `Ultima modifica: ${date.toLocaleDateString()} ${date.toLocaleTimeString()} | Autore: ${latest.autore}`;
            }
        }

        window.logout = () => { auth.signOut(); localStorage.removeItem('csr_user_profile'); location.reload(); };
        window.onload = initAuth;
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-80">
            <h2 class="text-xl font-bold mb-4">CSR Hub Login</h2>
            <input type="text" id="login-name" placeholder="Nome" class="w-full border p-2 rounded-lg mb-2">
            <select id="login-role" class="w-full border p-2 rounded-lg mb-4"><option>CSR Manager</option></select>
            <button onclick="handleLogin(event)" class="w-full bg-emerald-600 text-white py-2 rounded-lg">Entra</button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden flex-grow pb-12">
        <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
            <span class="font-bold">🌿 CSR Strategic Hub</span>
            <div class="flex items-center gap-4 text-xs">
                <span id="user-name-display" class="font-bold">--</span>
                <button onclick="logout()" class="text-rose-500">Esci</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 bg-white p-6 rounded-[2rem] shadow-sm border h-fit">
                <h3 class="font-bold mb-4">Nuova Iniziativa</h3>
                <form id="initiative-form" onsubmit="saveInitiative(event)" class="space-y-3">
                    <input type="text" id="nome_iniziativa" placeholder="Nome Iniziativa" required class="w-full p-2 border rounded-xl text-sm">
                    <select id="categoria" class="w-full p-2 border rounded-xl text-sm">
                        <option>Salute e Inclusione</option>
                        <option>Comunità e Ambiente</option>
                        <option>Educazione e Giovani</option>
                    </select>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="data_evento" required class="p-2 border rounded-xl text-xs">
                        <select id="frequenza" class="p-2 border rounded-xl text-xs">
                            <option value="singolo evento">Singolo Evento</option>
                            <option value="mensile">Mensile</option>
                            <option value="trimestrale">Trimestrale</option>
                            <option value="semestrale">Semestrale</option>
                            <option value="annuale">Annuale</option>
                        </select>
                    </div>
                    <textarea id="descrizione" placeholder="Note..." class="w-full p-2 border rounded-xl text-sm"></textarea>
                    <div class="flex gap-2">
                        <input type="number" id="kpi_valore" placeholder="Valore" required class="w-1/2 p-2 border rounded-xl text-sm">
                        <input type="text" id="kpi_unita" placeholder="Unità" required class="w-1/2 p-2 border rounded-xl text-sm">
                    </div>
                    <div class="flex items-center gap-2 p-2 bg-slate-50 rounded-xl">
                        <input type="checkbox" id="alert_attivo">
                        <label for="alert_attivo" class="text-[10px] font-bold">ATTIVA AVVISO SCADENZA</label>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Registra</button>
                </form>
            </aside>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] border h-72">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4">Mix Categorie</h4>
                        <div class="h-48"><canvas id="chart-doughnut"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border h-72 flex flex-col">
                        <div id="comparison-nav" class="flex justify-between items-center mb-2 hidden">
                            <button onclick="changeChart(-1)" class="p-1 hover:bg-slate-100 rounded">◀</button>
                            <h4 id="current-kpi-label" class="text-[10px] font-bold text-emerald-600 uppercase"></h4>
                            <button onclick="changeChart(1)" class="p-1 hover:bg-slate-100 rounded">▶</button>
                        </div>
                        <div class="flex-grow"><canvas id="chart-comparison"></canvas></div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                    <table class="w-full">
                        <thead class="bg-slate-50 text-[10px] uppercase text-slate-400">
                            <tr><th class="p-4 text-left">Iniziativa</th><th class="p-4 text-left">Area</th><th class="p-4 text-left">Frequenza</th><th class="p-4 text-right">KPI</th><th class="p-4 text-right">Azioni</th></tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t px-6 py-2 text-[10px] text-slate-400 flex justify-center italic">
        <span id="footer-info">In attesa di dati...</span>
    </footer>

</body>
</html>
